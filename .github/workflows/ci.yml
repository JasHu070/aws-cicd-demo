name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t aws-cicd-demo:v1 .

      - name: Tag Docker Image
        run: |
          docker tag aws-cicd-demo:v1 381492259587.dkr.ecr.ap-south-1.amazonaws.com/aws-cicd-demo:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 381492259587.dkr.ecr.ap-south-1.amazonaws.com/aws-cicd-demo:latest
