name: CI PIPELINE

on:
  push:
     banches:
       -main

jobs:
  test:
   runs-on: ubuntu-latest
  
  steps:
    -name: checkout Repository
     uses: actions/checkout@v4

    -name: Setup Python
     uses: actions/setup-python@v5
     with:
       python-version: "3.12"

   -name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

   -name: Run tests
    run: |
      pytest

